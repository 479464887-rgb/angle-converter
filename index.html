<style>:root{--bg:#0d1117;--surface:#161b22;--border:#30363d;--text:#c9d1d9;--accent:#58a6ff;}*{margin:0;padding:0;box-sizing:border-box;}body{font-family:-apple-system,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:40px 16px;}.card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:24px;max-width:400px;width:100%;}h1{font-size:20px;color:#f0f6fc;margin-bottom:20px;text-align:center;}input{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:14px;color:var(--text);font-size:20px;text-align:center;margin-bottom:12px;}input:focus{outline:none;border-color:var(--accent);}select{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:10px;color:var(--text);font-size:14px;margin-bottom:12px;}.results{display:grid;gap:6px;}.r{display:flex;justify-content:space-between;padding:10px 12px;background:var(--bg);border-radius:6px;font-size:13px;}.r .val{color:var(--accent);font-weight:600;}</style>
<script type="application/ld+json">
{"@context":"https://schema.org","@type":"WebApplication","name":"Angle Converter","description":"Convert between degrees, radians, gradians","url":"https://479464887-rgb.github.io/angle-converter/","applicationCategory":"DeveloperApplication","operatingSystem":"Web","offers":{"@type":"Offer","price":"0","priceCurrency":"USD"}}
</script>
</head>
<body>
<div class="card"><h1>📐 Angle
</h1>
<input type="number" id="val" value="180" oninput="conv()">
<select id="from" onchange="conv()"><option value="deg" selected>Degrees
</option>
<option value="rad">Radians
</option>
<option value="grad">Gradians
</option>
</select>
<div class="results" id="results">
</div>
</div>
<script>
'use strict';
const toDeg={deg:1,rad:57.2958,grad:0.9};
const units=Object.keys(toDeg);

function ){const v=parseFloat(document.getElementById('val').value)||0;
const d=v*toDeg[document.getElementById('from').value];
document.getElementById('results').innerHTML=units.filter(u=>u!==document.getElementById('from').value).map(u=>'<div class="r"><span>'+u+'</span><span class="val">'+(d/toDeg[u]).toFixed(4)+'</span></div>').join('')}conv();
</script>
</body>
